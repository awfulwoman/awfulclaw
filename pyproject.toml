[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "awfulclaw"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic",
    "python-dotenv",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
    "pyright",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"
