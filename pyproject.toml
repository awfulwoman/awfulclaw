[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "awfulclaw"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "croniter",
    "ddgs>=9.12.0",
    "google-api-python-client",
    "google-auth-oauthlib",
    "httpx",
    "mcp>=1.26.0",
    "python-dotenv",
]

[project.optional-dependencies]
vision = [
    "anthropic",
]
dev = [
    "ruff",
    "pytest",
    "pyright",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.hatch.build.targets.wheel]
packages = ["app/awfulclaw", "app/awfulclaw_mcp"]

[tool.pytest.ini_options]
testpaths = ["app/tests"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "strict"
exclude = ["pull", ".venv"]
extraPaths = ["app"]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=9.0.2",
    "ruff>=0.15.8",
]
